<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mi Aplicación Full Stack</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Aplicación Full Stack con Docker Compose</h1>
    <p>Esta aplicación demuestra la comunicación entre frontend, backend y base de datos.</p>
    
    <button onclick="checkStatus()">Verificar Estado del Backend</button>
    
    <div id="result"></div>

    <script>
        async function checkStatus() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Consultando backend...';
            
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <h3>Respuesta del Backend:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
