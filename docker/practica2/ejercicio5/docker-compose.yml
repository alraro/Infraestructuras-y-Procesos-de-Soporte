volumes:
  database-volume:

services:
  database:
    image: postgres:15-alpine
    container_name: test-db
    env_file:
      - ./.env
    volumes:
      - database-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 3s