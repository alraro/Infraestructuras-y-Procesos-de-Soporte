services:
  frontend:
    image: nginx:1.29.5-alpine
    container_name: frontend-nginx
    ports:
      - 8080:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - frontend

  api:
    build: ./api
    container_name: backend-python
    env_file:
      - ./.env
    depends_on:
      database:
        condition: service_healthy 
    networks:
      - frontend
      - backend

  database:
    image: postgres:15-alpine
    container_name: database-postgres
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 3s
    networks:
      - backend

networks:
  frontend:
  backend: