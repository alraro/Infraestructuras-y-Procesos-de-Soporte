services:
  db:
    image: postgres:15-alpine
    container_name: database
    environment:
      - POSTGRES_PASSWORD=secretpassword
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
  web:
    image: adminer:5
    container_name: web-service
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy