apiVersion: apps/v1
kind: Deployment
metadata:
  name: "readiness-app"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: "readiness-app"
  template:
    metadata:
      labels:
        app: "readiness-app"
    spec:
      containers:
        - name: "readiness-app-container"
          image: nginx:1.24
          resources:
            requests:
              cpu: "250m"
              memory: "400Mi"
            limits:
              cpu: "500m"
              memory: "500Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: "servicio-ej2"
spec:
  selector:
    app: readiness-app
  ports: 
    - port: 80
      targetPort: 80
  type: ClusterIP