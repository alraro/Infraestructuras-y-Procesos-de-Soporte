apiVersion: v1
kind: Pod
metadata:
  name: liveless-nginx
  labels:
    app: ex1
spec:
  containers:
    - name: liveless-nginx
      image: nginx:1.24
      resources:
        requests:
          memory: "64Mi"
          cpu: "250m"
        limits:
          memory: "128Mi"
          cpu: "500m"
      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 10
        periodSeconds: 5
        failureThreshold: 3
---
apiVersion: v1
kind: Pod
metadata:
  name: liveness-exec
  labels: 
    app: ex1
spec:
  terminationGracePeriodSeconds: 1
  containers:
    - name: liveness-exec-cont
      image: busybox
      command: ["/bin/sh", "-c"]
      args:
      - |
        while true; do
          touch /tmp/healthy
          sleep 5
          rm /tmp/healthy
          sleep 5
        done
      resources:
        requests:
          cpu: "250m"
          memory: "400Mi"
        limits:
          cpu: "500m"
          memory: "500Mi"
      livenessProbe:
        exec:
          command: ["test", "-f", "/tmp/healthy"]
        initialDelaySeconds: 5
        periodSeconds: 1
        failureThreshold: 1