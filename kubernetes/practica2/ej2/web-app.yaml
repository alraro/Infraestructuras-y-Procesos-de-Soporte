apiVersion: v1
kind: Namespace
metadata:
  name: ej2

---

apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: web-app
  name: web-app
  namespace: ej2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - image: nginx:alpine
        name: nginx
        ports:
        - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  labels:
    app: servicio-web-app
  name: servicio-web-app
  namespace: ej2
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: web-app
  type: ClusterIP
