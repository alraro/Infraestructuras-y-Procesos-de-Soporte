apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: volumen-persistente
  namespace: ej4
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---

apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: database
  name: database
  namespace: ej4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
      - image: postgres:15
        name: postgres
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        env:
        - name: POSTGRES_DB
          value: database
        - name: POSTGRES_USER
          value: user
        - name: POSTGRES_PASSWORD
          value: password
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: volumen-persistente

---

apiVersion: v1
kind: Service
metadata:
  labels:
    app: servicio-postgres
  name: servicio-postgres
  namespace: ej4
spec:
  ports:
  - name: database-port
    port: 5432
    targetPort: 5432
  selector:
    app: database
  type: ClusterIP
